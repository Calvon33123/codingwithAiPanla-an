<!DOCTYPE html>
<html>
<body>

<!-- Page title shown on the webpage -->
<h2>Tip Calculator</h2>

<!-- Input field for bill amount -->
<input type="number" id="bill" placeholder="Bill Amount">

<!-- Input field for tip percentage -->
<input type="number" id="tip" placeholder="Tip %">

<!-- Button that runs the JavaScript function when clicked -->
<button onclick="calculateTip()">Calculate</button>

<!-- Area where the result (tip + total) will be displayed -->
<p id="result"></p>

<script>

// Function that calculates the tip and total bill
function calculateTip() {

    // Get bill value from input and convert it to a number
    let bill = Number(document.getElementById("bill").value);

    // Get tip percentage value from input and convert it to a number
    let tip = Number(document.getElementById("tip").value);

    // Calculate tip amount based on percentage
    let tipAmount = bill * tip / 100;

    // Calculate total amount (bill + tip)
    let total = bill + tipAmount;

    // Display results in the paragraph with id "result"
    document.getElementById("result").innerHTML =
        "Tip: ₱" + tipAmount.toFixed(2) +   // format tip to 2 decimal places
        "<br>Total: ₱" + total.toFixed(2);  // format total to 2 decimal places 
}

</script>

</body>
</html>
