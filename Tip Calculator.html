<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tip</title><style>body{font-family:Arial,sans-serif;padding:18px;max-width:480px;margin:auto}input,button{display:block;width:100%;margin:.4rem 0}.row{display:flex;gap:.4rem}.row button{width:50%}.res{margin-top:.4rem;font-weight:600}</style></head><body><h1>Tip</h1><input id=b type=number min=0 step=.01 placeholder="Bill $"><input id=t type=number min=0 step=.1 value=15><input id=p type=number min=1 value=1><div class="row"><button id=go>Calc</button><button id=r>Reset</button></div><div id=o class="res">Tip: $0.00 — Total: $0.00</div><script>const $=id=>document.getElementById(id),b=$('b'),t=$('t'),p=$('p'),o=$('o'),f=n=>n.toLocaleString(undefined,{style:'currency',currency:'USD'});function c(){const B=parseFloat(b.value)||0,T=parseFloat(t.value)||0,P=Math.max(1,parseInt(p.value)||1),tip=B*(T/100),tot=B+tip;o.textContent=`Tip per person: ${f(tip/P)} — Total per person: ${f(tot/P)}`}$('go').onclick=c;$('r').onclick=()=>{b.value='';t.value=15;p.value=1;o.textContent='Tip: $0.00 — Total: $0.00'}[b,t,p].forEach(x=>x.oninput=()=>b.value.trim()&&c());</script></body></html>
